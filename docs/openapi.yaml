          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - 'Admin Orders'
    put:
      summary: 'Update any order (admin)'
      operationId: updateAnyOrderadmin
      description: ''
      parameters: []
      responses: {}
      tags:
        - 'Admin Orders'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                currency:
                  type: string
                  description: 'Must be 3 characters.'
                  example: bng
                tax:
                  type: number
                  description: 'Must be at least 0.'
                  example: 12
                discount:
                  type: number
                  description: 'Must be at least 0.'
                  example: 77
                meta:
                  type: object
                  description: ''
                  example: null
                  properties: {}
                  nullable: true
                items:
                  type: array
                  description: 'Must have at least 1 items.'
                  example: null
                  items:
                    type: object
                    properties:
                      product_name:
                        type: string
                        description: 'This field is required when <code>items</code> is present. Must not be greater than 255 characters.'
                        example: i
                      quantity:
                        type: integer
                        description: 'This field is required when <code>items</code> is present. Must be at least 1.'
                        example: 43
                      price:
                        type: number
                        description: 'This field is required when <code>items</code> is present. Must be at least 0.'
                        example: 60
    parameters:
      -
        in: path
        name: order_uuid
        description: ''
        example: 019f0749-a351-731e-9264-280e96308d52
        required: true
        schema:
          type: string
