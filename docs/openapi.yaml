      operationId: listAllOrders
      description: ''
      parameters:
        -
          in: query
          name: status
          description: 'Filter by status.'
          example: confirmed
          required: false
          schema:
            type: string
            description: 'Filter by status.'
            example: confirmed
        -
          in: query
          name: 'sort_by[total]'
          description: 'Sort by a column (asc|desc).'
          example: desc
          required: false
          schema:
            type: string
            description: 'Sort by a column (asc|desc).'
            example: desc
      responses:
        401:
          description: ''
          content:
            application/json:
