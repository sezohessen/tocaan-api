                description:
                  type: string
                  description: ''
                  example: 'Eius et animi quos velit et.'
                  nullable: true
                price:
                  type: number
                  description: 'Must be at least 0.'
                  example: 60
                currency:
                  type: string
                  description: 'Must be 3 characters.'
                  example: dlj
                stock:
