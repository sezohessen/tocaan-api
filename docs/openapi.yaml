openapi: 3.0.3
info:
  title: 'Tocaan API Documentation'
  description: ''
  version: 1.0.0
servers:
  - url: 'http://tocaan.test'
tags:
  - name: 'Admin Authentication'
    description: ''
  - name: 'Admin Orders'
    description: ''
  - name: 'Admin Payments'
    description: ''
  - name: 'Admin Products'
    description: ''
  - name: Catalog
    description: ''
  - name: Endpoints
    description: ''
  - name: 'Member Authentication'
    description: ''
  - name: 'Member Cart'
    description: ''
  - name: 'Member Orders'
    description: ''
  - name: 'Member Payments'
    description: ''
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Obtain a JWT by calling <code>POST /api/v1/auth/login</code> or <code>POST /api/v1/auth/register</code>, then send it as <code>Authorization: Bearer {token}</code>.'
security:
  -
    default: []
paths:
  /api/v1/admin/auth/login:
    post:
      summary: 'Login as an admin'
      operationId: loginAsAnAdmin
      description: ''
      parameters: []
      responses: {}
      tags:
        - 'Admin Authentication'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: gbailey@example.net
                password:
                  type: string
                  description: ''
                  example: '|]|{+-'
              required:
                - email
                - password
      security: []
  /api/v1/admin/auth/me:
    get:
      summary: 'Current admin'
      operationId: currentAdmin
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
